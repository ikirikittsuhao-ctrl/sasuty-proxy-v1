<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sasuty Proxy v1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #f4f4f9; }
        
        /* Tab Bar */
        #tab-bar { display: flex; background: #e0e0e0; padding: 5px 5px 0 5px; gap: 5px; }
        .tab { padding: 8px 15px; background: #fff; border-radius: 5px 5px 0 0; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .tab.active { background: #f4f4f9; font-weight: bold; }
        .tab button { border: none; background: none; cursor: pointer; color: #888; }
        #add-tab { padding: 8px 15px; cursor: pointer; background: #ddd; border-radius: 5px 5px 0 0; border: none; }

        /* Browser Area */
        #browser-container { flex: 1; position: relative; background: #fff; }
        .view { width: 100%; height: 100%; display: none; flex-direction: column; }
        .view.active { display: flex; }
        
        /* Toolbar */
        .toolbar { padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #ddd; }
        .url-bar { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Home Screen */
        .home-screen { padding: 40px; text-align: center; }
        .bookmarks { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .bookmark-item { padding: 10px 20px; background: #eee; border-radius: 20px; cursor: pointer; }
        
        iframe { flex: 1; border: none; }
    </style>
</head>
<body>

<div id="tab-bar">
    <div id="tabs-container" style="display:flex; gap:5px;"></div>
    <button id="add-tab">+</button>
</div>

<div id="browser-container"></div>

<script>
    let tabs = [];
    let activeTabId = null;

    const container = document.getElementById('browser-container');
    const tabsContainer = document.getElementById('tabs-container');

    function createTab() {
        const id = Date.now();
        tabs.push({ id, url: '' });
        
        // Tab UI
        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.innerHTML = `<span>New Tab</span><button onclick="removeTab(${id})">x</button>`;
        tabEl.onclick = () => switchTab(id);
        tabsContainer.appendChild(tabEl);
        
        // Browser View
        const view = document.createElement('div');
        view.className = 'view';
        view.id = `view-${id}`;
        view.innerHTML = `
            <div class="toolbar">
                <input type="text" class="url-bar" placeholder="URLを入力または検索...">
                <button onclick="loadUrl(${id})">Go</button>
            </div>
            <div class="home-screen">
                <h1>Sasuty Proxy v1</h1>
                <div class="bookmarks">
                    <div class="bookmark-item" onclick="quickLoad('${id}', 'https://google.com')">Google</div>
                    <div class="bookmark-item" onclick="quickLoad('${id}', 'https://youtube.com')">YouTube</div>
                </div>
            </div>
            <iframe style="display:none"></iframe>
        `;
        container.appendChild(view);
        switchTab(id);
    }

    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${id}`).classList.add('active');
    }

    function removeTab(id) {
        // 実装はシンプルに、必要に応じて拡張してください
    }

    function quickLoad(tabId, url) {
        const view = document.getElementById(`view-${tabId}`);
        view.querySelector('.url-bar').value = url;
        loadUrl(tabId);
    }

    async function loadUrl(tabId) {
        const view = document.getElementById(`view-${tabId}`);
        const url = view.querySelector('.url-bar').value;
        const iframe = view.querySelector('iframe');
        const home = view.querySelector('.home-screen');
        
        // ここにUVプロキシのロード処理を接続
        iframe.src = "/embed#" + url; 
        iframe.style.display = 'block';
        home.style.display = 'none';
    }

    document.getElementById('add-tab').onclick = createTab;
    createTab();
</script>
</body>
</html>
