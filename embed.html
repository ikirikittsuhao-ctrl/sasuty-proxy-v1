<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sasuty Proxy Loader</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; }
        #embed-frame { flex: 1; border: none; }
    </style>
</head>
<body>
    <iframe id="embed-frame"></iframe>
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script type="module">
        import { registerSW } from "/prxy/register-sw.mjs";
        // ... (元のproxy初期化ロジック) ...
        async function init() {
            await registerSW();
            const url = window.location.hash.substring(1);
            if(url) {
                document.getElementById('embed-frame').src = __uv$config.prefix + __uv$config.encodeUrl(url);
            }
        }
        init();
    </script>
</body>
</html>
