<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sasuty Proxy Loader</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; overflow: hidden; }
        #embed-frame { flex: 1; border: none; width: 100%; display: none; }
        
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            z-index: 10;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div>読み込み中...</div>
    </div>

    <iframe id="embed-frame"></iframe>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script type="module">
        import { registerSW } from "/prxy/register-sw.mjs";
        
        async function init() {
            try {
                await registerSW();
                const url = window.location.hash.substring(1);
                const iframe = document.getElementById('embed-frame');
                const overlay = document.getElementById('loading-overlay');

                if(url) {
                    iframe.src = __uv$config.prefix + __uv$config.encodeUrl(url);
                    iframe.onload = () => {
                        overlay.style.display = 'none';
                        iframe.style.display = 'block';
                    };
                }
            } catch (err) {
                console.error("Initialization failed:", err);
            }
        }
        init();
    </script>
</body>
</html>
